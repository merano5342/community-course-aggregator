<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--color-surface-bg); font-family: var(--font-body); display: flex; align-items: stretch; height: 240px; }
  .sidebar-wrap { display: flex; height: 100%; }
  .label-col { padding: 24px 20px; display: flex; flex-direction: column; gap: 32px; justify-content: center; }
  .label { font-size: 10px; color: var(--color-text-muted); text-transform: uppercase; letter-spacing: .1em; }
  .nav-label { font-size: 11px; color: var(--color-text-secondary); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { AppSidebar } = window.DesignSystem_7d1533;
const [active, setActive] = React.useState('browse');
function Demo() {
  const [active, setActive] = React.useState('browse');
  return (
    <div style={{display:'flex', height:'100%', width:'100%'}}>
      <div className="sidebar-wrap">
        <AppSidebar activeItem={active} onNavigate={setActive} />
      </div>
      <div style={{padding:'24px 32px', display:'flex', flexDirection:'column', justifyContent:'center', gap:16}}>
        <div>
          <div className="label" style={{marginBottom:8}}>Active: <strong style={{color:'var(--color-accent)'}}>{active}</strong></div>
          <div style={{display:'flex', gap:8, flexWrap:'wrap'}}>
            {['browse','courses','saved','stats'].map(id => (
              <button key={id} onClick={() => setActive(id)} style={{
                padding:'4px 12px', borderRadius:'var(--radius-pill)', border:'var(--border-medium)',
                background: active===id ? 'var(--color-accent)' : 'var(--color-surface-card)',
                color: active===id ? '#fff' : 'var(--color-text-secondary)',
                fontSize:'var(--text-xs)', fontFamily:'var(--font-body)', cursor:'pointer'
              }}>{id}</button>
            ))}
          </div>
        </div>
        <div style={{fontSize:'var(--text-sm)', color:'var(--color-text-secondary)', maxWidth:280}}>
          72px 固定寬度，包含 2×2 品牌標誌與 4 個 icon-only 導航按鈕。點擊左側按鈕切換狀態。
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
