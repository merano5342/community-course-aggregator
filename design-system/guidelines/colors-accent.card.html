<!-- @dsCard group="Colors" viewport="700x140" name="Accent — 莫蘭迪藍綠" subtitle="主要強調色，替換橘色系" -->
<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px 28px; background: var(--color-surface-bg); font-family: var(--font-body); display: flex; align-items: flex-start; gap: 14px; box-sizing: border-box; }
  .sw { display: flex; flex-direction: column; gap: 7px; flex: 1; }
  .color { height: 58px; border-radius: 10px; }
  .name { font-size: 11px; color: var(--color-text-secondary); font-weight: 500; }
  .val  { font-size: 10px; color: var(--color-text-muted); font-family: monospace; }
</style>
</head>
<body>
  <div class="sw"><div class="color" style="background:var(--color-accent)"></div><div class="name">accent</div><div class="val">#3e8a84</div></div>
  <div class="sw"><div class="color" style="background:var(--color-accent-hover)"></div><div class="name">hover</div><div class="val">#2d6f6a</div></div>
  <div class="sw"><div class="color" style="background:var(--color-accent-active)"></div><div class="name">active</div><div class="val">#235a56</div></div>
  <div class="sw"><div class="color" style="background:var(--color-accent-light)"></div><div class="name">light</div><div class="val">#76b3ae</div></div>
  <div class="sw"><div class="color" style="background:var(--color-accent-subtle); border:1px solid var(--color-surface-border)"></div><div class="name">subtle</div><div class="val">#c8e0de</div></div>
  <div class="sw"><div class="color" style="background:var(--color-dark);display:flex;align-items:center;justify-content:center"><span style="color:var(--color-accent-on-dark);font-weight:700;font-size:13px;letter-spacing:.04em">Aa</span></div><div class="name">on-dark</div><div class="val">#5ca8a3</div></div>
</body>
</html>
