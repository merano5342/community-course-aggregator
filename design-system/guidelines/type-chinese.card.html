<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px 28px; background: var(--color-surface-bg); font-family: var(--font-body); display: flex; flex-direction: column; gap: 10px; box-sizing: border-box; }
  .row { display: flex; align-items: baseline; gap: 20px; }
  .meta { font-size: 10px; color: var(--color-text-muted); font-family: monospace; width: 80px; flex-shrink: 0; }
</style>
</head>
<body>
  <div class="row"><div class="meta">700 · 2xl</div><div style="font-size:var(--text-2xl);font-weight:var(--weight-bold);color:var(--color-text-primary);letter-spacing:var(--tracking-tight)">探索社區學習的無限可能</div></div>
  <div class="row"><div class="meta">600 · xl</div><div style="font-size:var(--text-xl);font-weight:var(--weight-semibold);color:var(--color-text-primary)">社區大學秋季課程開始報名</div></div>
  <div class="row"><div class="meta">400 · base</div><div style="font-size:var(--text-base);color:var(--color-text-primary);line-height:var(--leading-normal)">報名前請確認上課時間與地點，部分課程需自備材料費。</div></div>
  <div class="row"><div class="meta">400 · sm</div><div style="font-size:var(--text-sm);color:var(--color-text-secondary)">每週三 · 下午 14:00–16:00 · 台北市社區中心 B棟</div></div>
  <div class="row"><div class="meta">400 · xs</div><div style="font-size:var(--text-xs);color:var(--color-text-muted)">報名截止：2025/09/30 · 每班限 20 人</div></div>
</body>
</html>
