<!-- @dsCard group="Spacing" viewport="700x160" name="Spacing — 間距比例尺" subtitle="4px 基礎單位，8px 倍數體系" -->
<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px 28px; background: var(--color-surface-bg); font-family: var(--font-body); display: flex; flex-direction: column; gap: 8px; box-sizing: border-box; }
  .row { display: flex; align-items: center; gap: 12px; }
  .bar { background: var(--color-accent); height: 14px; border-radius: 3px; flex-shrink: 0; }
  .label { font-size: 10px; color: var(--color-text-muted); font-family: monospace; width: 100px; }
  .px { font-size: 11px; color: var(--color-text-secondary); }
</style>
</head>
<body>
  <div class="row"><div class="label">--space-1</div><div class="bar" style="width:4px"></div><div class="px">4px</div></div>
  <div class="row"><div class="label">--space-2</div><div class="bar" style="width:8px"></div><div class="px">8px</div></div>
  <div class="row"><div class="label">--space-3</div><div class="bar" style="width:12px"></div><div class="px">12px</div></div>
  <div class="row"><div class="label">--space-4</div><div class="bar" style="width:16px"></div><div class="px">16px</div></div>
  <div class="row"><div class="label">--space-5</div><div class="bar" style="width:24px"></div><div class="px">24px</div></div>
  <div class="row"><div class="label">--space-6</div><div class="bar" style="width:32px"></div><div class="px">32px</div></div>
  <div class="row"><div class="label">--space-7</div><div class="bar" style="width:48px"></div><div class="px">48px</div></div>
  <div class="row"><div class="label">--space-8</div><div class="bar" style="width:64px"></div><div class="px">64px</div></div>
</body>
</html>
