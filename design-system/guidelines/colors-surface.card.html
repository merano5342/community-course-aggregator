<!-- @dsCard group="Colors" viewport="700x140" name="Surface — 暖灰背景系" subtitle="頁面背景與卡片底色（暖灰調）" -->
<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px 28px; background: var(--color-surface-bg); font-family: var(--font-body); display: flex; align-items: flex-start; gap: 14px; box-sizing: border-box; }
  .sw { display: flex; flex-direction: column; gap: 7px; flex: 1; }
  .color { height: 58px; border-radius: 10px; border: 1px solid var(--color-surface-border); }
  .name { font-size: 11px; color: var(--color-text-secondary); font-weight: 500; }
  .val  { font-size: 10px; color: var(--color-text-muted); font-family: monospace; }
</style>
</head>
<body>
  <div class="sw"><div class="color" style="background:var(--color-surface-bg)"></div><div class="name">bg</div><div class="val">#f0eeeb</div></div>
  <div class="sw"><div class="color" style="background:var(--color-surface-card)"></div><div class="name">card</div><div class="val">#e6e4e1</div></div>
  <div class="sw"><div class="color" style="background:var(--color-surface-hover)"></div><div class="name">hover</div><div class="val">#dedad6</div></div>
  <div class="sw"><div class="color" style="background:var(--color-surface-border)"></div><div class="name">border</div><div class="val">#d0cec9</div></div>
  <div class="sw"><div class="color" style="background:var(--color-white-muted)"></div><div class="name">white-muted</div><div class="val">#f8f7f5</div></div>
  <div class="sw"><div class="color" style="background:var(--color-white)"></div><div class="name">white</div><div class="val">#ffffff</div></div>
</body>
</html>
